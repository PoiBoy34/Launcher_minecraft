<script>
  let selectedPack = null;
  let isLoggedIn = false;

  async function loadCatalog() {
    const result = await window.api.getCatalog();
    const grid = document.getElementById('packs-grid');
    const status = document.getElementById('catalog-status');

    if (!result.success) {
      status.textContent = "Erreur : " + result.error;
      return;
    }

    status.style.display = 'none';

    result.catalog.modpacks.forEach(pack => {
      const card = document.createElement('div');
      card.className = 'pack-card';
      card.innerHTML = `
        <div class="selected-badge">✓</div>
        <div class="pack-img-wrap">
          <img src="${pack.icon_url}" onerror="this.style.display='none';this.nextElementSibling.style.display='block'" alt="">
          <span class="pack-emoji" style="display:none">🎮</span>
        </div>
        <div class="pack-name">${pack.name}</div>
        <div class="pack-desc">${pack.description}</div>
        <div class="pack-meta">
          <span class="pack-tag mc">MC ${pack.minecraft}</span>
          <span class="pack-tag">${pack.loader}</span>
          <span class="pack-tag">v${pack.version}</span>
        </div>
      `;
      card.addEventListener('click', () => selectPack(pack, card));
      grid.appendChild(card);
    });
  }

  function selectPack(pack, card) {
    document.querySelectorAll('.pack-card').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');
    selectedPack = pack;
    document.getElementById('sel-icon').textContent = '⚡';
    document.getElementById('sel-name').textContent = pack.name;
    document.getElementById('sel-meta').textContent = 'Minecraft ' + pack.minecraft + ' · ' + pack.loader + ' · v' + pack.version;
    updatePlayBtn();
  }

  function updatePlayBtn() {
    const btn = document.getElementById('play-btn');
    if (selectedPack && isLoggedIn) {
      btn.disabled = false;
      btn.textContent = 'JOUER — ' + selectedPack.name.toUpperCase();
    } else if (!isLoggedIn) {
      btn.disabled = true;
      btn.textContent = 'CONNECTEZ-VOUS POUR JOUER';
    } else {
      btn.disabled = true;
      btn.textContent = 'SÉLECTIONNER UN MODPACK';
    }
  }

  // --- ACTIONS DES BOUTONS ---
  document.getElementById('login-btn').addEventListener('click', () => {
    document.getElementById('login-btn').innerHTML = 'Connexion...';
    document.getElementById('login-btn').disabled = true;
    window.api.loginMicrosoft();
  });

  document.getElementById('play-btn').addEventListener('click', () => {
    if (!selectedPack) return;
    const btn = document.getElementById('play-btn');
    btn.disabled = true;
    btn.classList.add('syncing');
    btn.textContent = 'SYNCHRONISATION...';
    document.getElementById('sync-log').style.color = "#6b7280";
    document.getElementById('sync-log').textContent = 'Vérification des mods...';
    window.api.launchGame(selectedPack);
  });

  // --- ÉVÈNEMENTS API ---
  window.api.onAuthSuccess((data) => {
    document.getElementById('login-btn').style.display = 'none';
    const pill = document.getElementById('user-pill');
    pill.style.display = 'flex';
    document.getElementById('username-label').textContent = data.name;
    isLoggedIn = true;
    updatePlayBtn();
  });

  window.api.onAuthError((data) => {
    const btn = document.getElementById('login-btn');
    btn.disabled = false;
    btn.textContent = 'Réessayer';
  });

  // Si l'auto-connexion échoue, on remet le joli bouton Microsoft
  window.api.onAuthMissing(() => {
    const btn = document.getElementById('login-btn');
    btn.disabled = false;
    btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 21 21" fill="none">
            <rect x="1" y="1" width="9" height="9" fill="#F25022"/>
            <rect x="11" y="1" width="9" height="9" fill="#7FBA00"/>
            <rect x="1" y="11" width="9" height="9" fill="#00A4EF"/>
            <rect x="11" y="11" width="9" height="9" fill="#FFB900"/>
          </svg>
          Connexion Microsoft`;
  });

  window.api.onSyncStatus((data) => {
    document.getElementById('sync-log').style.color = "#6b7280"; 
    document.getElementById('sync-log').textContent = data.message;
  });

  window.api.onSyncProgress((data) => {
    const bar = document.getElementById('sync-bar');
    bar.style.display = 'block';
    bar.value = data.pct;
    document.getElementById('sync-log').textContent = data.fileName + ' — ' + data.pct + '%';
    if (data.pct >= 100) setTimeout(() => { bar.style.display = 'none'; }, 1000);
  });

  window.api.onLaunchError((errorMsg) => {
    const btn = document.getElementById('play-btn');
    btn.disabled = false;
    btn.classList.remove('syncing');
    btn.textContent = 'JOUER — ' + selectedPack.name.toUpperCase();
    
    const log = document.getElementById('sync-log');
    log.textContent = "Erreur : " + errorMsg;
    log.style.color = "#ef4444"; 
  });

  // --- DÉMARRAGE AUTOMATIQUE ---
  document.getElementById('login-btn').innerHTML = 'Vérification...';
  document.getElementById('login-btn').disabled = true;
  window.api.autoLogin(); // Tente la connexion fantôme
  
  loadCatalog();
</script>
