<div id="bottom">
      <div id="selected-info">
        <div id="sel-icon">🎮</div>
        <div>
          <div id="sel-name">Aucun modpack sélectionné</div>
          <div id="sel-meta">Choisissez un modpack ci-dessus</div>
        </div>
      </div>
      
      <div id="action-row" style="display: flex; gap: 10px; align-items: center;">
        
        <select id="ram-select" style="padding: 13px; border-radius: 10px; background: rgba(255,255,255,0.08); color: white; border: 1px solid rgba(255,255,255,0.2); cursor: pointer; outline: none; font-family: 'Exo 2', sans-serif;">
          <option value="4" style="color: black;">4 Go (Recommandé)</option>
          <option value="6" style="color: black;">6 Go</option>
          <option value="8" style="color: black;">8 Go</option>
          <option value="12" style="color: black;">12 Go</option>
          <option value="16" style="color: black;">16 Go</option>
        </select>

        <button id="play-btn" disabled>JOUER</button>

        <button id="folder-btn" disabled style="padding: 13px 18px; border-radius: 10px; background: rgba(255,255,255,0.08); color: white; border: 1px solid rgba(255,255,255,0.2); cursor: pointer; transition: all 0.2s;" title="Ouvrir le dossier d'installation">
          📁
        </button>
      </div>

      <div id="sync-log"></div>
      <progress id="sync-bar" value="0" max="100"></progress>
    </div>
  </div>

<script>
  let selectedPack = null;
  let isLoggedIn = false;

  async function loadCatalog() {
    const result = await window.api.getCatalog();
    const grid = document.getElementById('packs-grid');
    const status = document.getElementById('catalog-status');

    if (!result.success) {
      status.textContent = "Erreur : " + result.error;
      return;
    }

    status.style.display = 'none';

    result.catalog.modpacks.forEach(pack => {
      const card = document.createElement('div');
      card.className = 'pack-card';
      card.innerHTML = `
        <div class="selected-badge">✓</div>
        <div class="pack-img-wrap">
          <img src="${pack.icon_url}" onerror="this.style.display='none';this.nextElementSibling.style.display='block'" alt="">
          <span class="pack-emoji" style="display:none">🎮</span>
        </div>
        <div class="pack-name">${pack.name}</div>
        <div class="pack-desc">${pack.description}</div>
        <div class="pack-meta">
          <span class="pack-tag mc">MC ${pack.minecraft}</span>
          <span class="pack-tag">${pack.loader}</span>
          <span class="pack-tag">v${pack.version}</span>
        </div>
      `;
      card.addEventListener('click', () => selectPack(pack, card));
      grid.appendChild(card);
    });
  }

  function selectPack(pack, card) {
    document.querySelectorAll('.pack-card').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');
    selectedPack = pack;
    document.getElementById('sel-icon').textContent = '⚡';
    document.getElementById('sel-name').textContent = pack.name;
    document.getElementById('sel-meta').textContent = 'Minecraft ' + pack.minecraft + ' · ' + pack.loader + ' · v' + pack.version;
    updatePlayBtn();
    
    // NOUVEAU: Active le bouton du dossier
    document.getElementById('folder-btn').disabled = false;
  }

  function updatePlayBtn() {
    const btn = document.getElementById('play-btn');
    if (selectedPack && isLoggedIn) {
      btn.disabled = false;
      btn.textContent = 'JOUER — ' + selectedPack.name.toUpperCase();
    } else if (!isLoggedIn) {
      btn.disabled = true;
      btn.textContent = 'CONNECTEZ-VOUS POUR JOUER';
    } else {
      btn.disabled = true;
      btn.textContent = 'SÉLECTIONNER UN MODPACK';
    }
  }

  document.getElementById('login-btn').addEventListener('click', () => {
    document.getElementById('login-btn').textContent = 'Connexion...';
    document.getElementById('login-btn').disabled = true;
    window.api.loginMicrosoft();
  });

  window.api.onAuthSuccess((data) => {
    document.getElementById('login-btn').style.display = 'none';
    const pill = document.getElementById('user-pill');
    pill.style.display = 'flex';
    document.getElementById('username-label').textContent = data.name;
    isLoggedIn = true;
    updatePlayBtn();
  });

  window.api.onAuthError((data) => {
    const btn = document.getElementById('login-btn');
    btn.disabled = false;
    btn.textContent = 'Réessayer';
  });

  window.api.onSyncStatus((data) => {
    document.getElementById('sync-log').style.color = "#6b7280"; 
    document.getElementById('sync-log').textContent = data.message;
  });

  window.api.onSyncProgress((data) => {
    const bar = document.getElementById('sync-bar');
    bar.style.display = 'block';
    bar.value = data.pct;
    document.getElementById('sync-log').textContent = data.fileName + ' — ' + data.pct + '%';
    if (data.pct >= 100) setTimeout(() => { bar.style.display = 'none'; }, 1000);
  });

  window.api.onLaunchError((errorMsg) => {
    const btn = document.getElementById('play-btn');
    btn.disabled = false;
    btn.classList.remove('syncing');
    btn.textContent = 'JOUER — ' + selectedPack.name.toUpperCase();
    
    const log = document.getElementById('sync-log');
    log.textContent = "Erreur : " + errorMsg;
    log.style.color = "#ef4444"; 
  });

  // NOUVEAU: Action pour le bouton dossier
  document.getElementById('folder-btn').addEventListener('click', () => {
    if (selectedPack) {
      window.api.openFolder(selectedPack.id);
    }
  });

  // MODIFIÉ: Action de lancement (envoie la RAM choisie)
  document.getElementById('play-btn').addEventListener('click', () => {
    if (!selectedPack) return;
    
    const ramValue = document.getElementById('ram-select').value;
    
    const btn = document.getElementById('play-btn');
    btn.disabled = true;
    btn.classList.add('syncing');
    btn.textContent = 'PRÉPARATION...';
    
    document.getElementById('sync-log').style.color = "#6b7280";
    document.getElementById('sync-log').textContent = 'Vérification des mods...';
    
    window.api.launchGame(selectedPack, ramValue);
  });

  // NOUVEAU: Effet de hover pour le bouton dossier
  document.getElementById('folder-btn').addEventListener('mouseover', function() {
      if(!this.disabled) this.style.background = 'rgba(255,255,255,0.15)';
  });
  document.getElementById('folder-btn').addEventListener('mouseout', function() {
      if(!this.disabled) this.style.background = 'rgba(255,255,255,0.08)';
  });

  loadCatalog();
</script>
</body>
</html>
