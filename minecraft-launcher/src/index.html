<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Exo+2:wght@300;400;500;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Exo 2', sans-serif; background: #0a0a1a; color: #eee; height: 100vh; overflow: hidden; position: relative; }
  #bg { position: fixed; inset: 0; z-index: 0; background-image: url('bg.png'); background-size: cover; background-position: center; filter: brightness(0.35); }
  #overlay { position: fixed; inset: 0; z-index: 1; background: linear-gradient(135deg, rgba(10,10,40,0.7) 0%, rgba(30,0,60,0.5) 50%, rgba(10,10,40,0.8) 100%); }
  #app { position: relative; z-index: 2; display: flex; flex-direction: column; height: 100vh; padding: 20px 28px; }
  #header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
  .logo-block { display: flex; align-items: center; gap: 12px; }
  .logo-icon { font-size: 36px; }
  .logo-text { font-family: 'Rajdhani', sans-serif; font-size: 28px; font-weight: 700; background: linear-gradient(90deg, #ffd700, #ff6b35, #e040fb); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .logo-sub { font-size: 11px; color: #a78bfa; letter-spacing: 0.15em; text-transform: uppercase; }
  #auth-block { display: flex; align-items: center; gap: 10px; }
  #login-btn { display: flex; align-items: center; gap: 8px; padding: 8px 18px; background: #107C10; color: white; border: none; border-radius: 20px; cursor: pointer; font-size: 13px; font-family: 'Exo 2', sans-serif; font-weight: 500; transition: all 0.2s; }
  #login-btn:hover { background: #15a015; transform: translateY(-1px); }
  #login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  #user-pill { display: none; align-items: center; gap: 8px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 20px; padding: 6px 14px; }
  .user-dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }
  #username-label { font-size: 13px; color: #d1fae5; }
  #section-title { font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 600; color: #a78bfa; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 12px; }
  #packs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; flex: 1; align-content: start; overflow-y: auto; padding-right: 4px; }
  #packs-grid::-webkit-scrollbar { width: 4px; }
  #packs-grid::-webkit-scrollbar-thumb { background: #a78bfa44; border-radius: 2px; }
  .pack-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 16px; cursor: pointer; transition: all 0.25s; position: relative; overflow: hidden; }
  .pack-card::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(168,139,250,0.1), rgba(251,191,36,0.05)); opacity: 0; transition: opacity 0.25s; }
  .pack-card:hover { border-color: rgba(168,139,250,0.5); transform: translateY(-2px); }
  .pack-card:hover::before { opacity: 1; }
  .pack-card.selected { border-color: #ffd700; background: rgba(255,215,0,0.08); box-shadow: 0 0 20px rgba(255,215,0,0.15); }
  .pack-card.selected::before { opacity: 1; }
  .pack-img-wrap { width: 56px; height: 56px; border-radius: 8px; overflow: hidden; margin-bottom: 10px; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; }
  .pack-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
  .pack-img-wrap .pack-emoji { font-size: 28px; }
  .pack-name { font-family: 'Rajdhani', sans-serif; font-size: 16px; font-weight: 700; color: #f9fafb; }
  .pack-desc { font-size: 11px; color: #9ca3af; margin-top: 4px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .pack-meta { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .pack-tag { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 600; background: rgba(168,139,250,0.2); color: #c4b5fd; }
  .pack-tag.mc { background: rgba(74,222,128,0.15); color: #6ee7b7; }
  .selected-badge { position: absolute; top: 8px; right: 8px; width: 20px; height: 20px; border-radius: 50%; background: #ffd700; display: none; align-items: center; justify-content: center; font-size: 11px; color: #000; }
  .pack-card.selected .selected-badge { display: flex; }
  #catalog-status { color: #9ca3af; font-size: 13px; padding: 20px 0; }
  #bottom { margin-top: 16px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 14px 18px; backdrop-filter: blur(10px); }
  #selected-info { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  #sel-icon { font-size: 24px; }
  #sel-name { font-family: 'Rajdhani', sans-serif; font-size: 18px; font-weight: 700; color: #ffd700; }
  #sel-meta { font-size: 12px; color: #9ca3af; }
  #launcher-version-tag { margin-left: auto; font-size: 11px; color: #6b7280; font-family: monospace; }
  #action-row { display: flex; align-items: center; gap: 10px; }
  #play-btn { flex: 1; padding: 13px 20px; background: linear-gradient(135deg, #7c3aed, #4f46e5); color: white; border: none; border-radius: 10px; font-family: 'Rajdhani', sans-serif; font-size: 18px; font-weight: 700; letter-spacing: 0.05em; cursor: pointer; transition: all 0.25s; text-transform: uppercase; }
  #play-btn:not(:disabled):hover { background: linear-gradient(135deg, #8b5cf6, #6366f1); transform: translateY(-1px); box-shadow: 0 4px 20px rgba(124,58,237,0.4); }
  #play-btn:disabled { background: rgba(255,255,255,0.08); color: #4b5563; cursor: not-allowed; }
  #play-btn.syncing { background: linear-gradient(135deg, #1d4ed8, #1e40af) !important; color: white !important; animation: btnpulse 1.2s infinite; }
  @keyframes btnpulse { 0%,100%{opacity:1}50%{opacity:0.7} }
  #sync-log { font-size: 11px; color: #6b7280; margin-top: 8px; min-height: 16px; font-family: monospace; }
  #sync-bar { width: 100%; height: 3px; margin-top: 6px; display: none; accent-color: #a78bfa; }

  /* SETTINGS PANEL */
  #settings-btn { width: 42px; height: 42px; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; color: #9ca3af; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
  #settings-btn:hover { background: rgba(255,255,255,0.12); color: #e2e8f0; }
  #settings-panel { display: none; position: fixed; inset: 0; z-index: 100; align-items: center; justify-content: center; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); }
  #settings-panel.open { display: flex; }
  .settings-box { background: #0f0f2a; border: 1px solid rgba(255,255,255,0.12); border-radius: 16px; padding: 28px; width: 420px; max-width: 90vw; max-height: 90vh; overflow-y: auto; }
  .settings-title { font-family: 'Rajdhani', sans-serif; font-size: 20px; font-weight: 700; color: #ffd700; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; }
  .settings-close { background: none; border: none; color: #6b7280; font-size: 20px; cursor: pointer; padding: 0; line-height: 1; }
  .settings-close:hover { color: #e2e8f0; }
  .settings-section { margin-bottom: 20px; }
  .settings-label { font-size: 12px; color: #a78bfa; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; }
  .ram-row { display: flex; align-items: center; gap: 12px; }
  .ram-row input[type=range] { flex: 1; accent-color: #7c3aed; }
  .ram-value { font-family: 'Rajdhani', sans-serif; font-size: 20px; font-weight: 700; color: #ffd700; min-width: 60px; text-align: right; }
  .folder-btn { display: flex; align-items: center; gap: 8px; width: 100%; padding: 10px 14px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #cbd5e1; cursor: pointer; font-size: 13px; font-family: 'Exo 2', sans-serif; transition: all 0.2s; margin-bottom: 8px; }
  .folder-btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(168,139,250,0.4); color: #fff; }
  .folder-btn .folder-icon { font-size: 16px; }
  .folder-btn.update-check { background: rgba(124,58,237,0.15); border-color: rgba(124,58,237,0.4); color: #c4b5fd; }
  .folder-btn.update-check:hover { background: rgba(124,58,237,0.25); }
  .folder-btn.reset-defaults { background: rgba(251,191,36,0.1); border-color: rgba(251,191,36,0.3); color: #fcd34d; }
  .folder-btn.reset-defaults:hover { background: rgba(251,191,36,0.2); }
  #update-status { font-size: 11px; color: #9ca3af; margin-top: 6px; text-align: center; }

  /* UPDATE BANNER */
  #update-banner { display: none; position: fixed; top: 16px; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg, #1e40af, #4f46e5); padding: 10px 16px; border-radius: 10px; align-items: center; gap: 12px; z-index: 50; box-shadow: 0 4px 24px rgba(79,70,229,0.5); }
  #update-banner.show { display: flex; }
  #update-text { color: #fff; font-size: 13px; font-weight: 500; }
  .banner-btn { background: rgba(255,255,255,0.2); color: #fff; border: 1px solid rgba(255,255,255,0.3); padding: 5px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; font-family: 'Exo 2', sans-serif; }
  .banner-btn:hover { background: rgba(255,255,255,0.3); }
  .banner-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .banner-close { background: none; border: none; color: #ccc; cursor: pointer; font-size: 14px; padding: 0 4px; }
  .banner-close:hover { color: #fff; }
</style>
</head>
<body>
  <div id="bg"></div>
  <div id="overlay"></div>

  <!-- Update Banner -->
  <div id="update-banner">
    <span id="update-text"></span>
    <button id="update-action" class="banner-btn">Télécharger</button>
    <button id="update-close" class="banner-close">✕</button>
  </div>

  <!-- Settings Panel -->
  <div id="settings-panel">
    <div class="settings-box">
      <div class="settings-title">
        ⚙️ Paramètres
        <button class="settings-close" id="settings-close">✕</button>
      </div>

      <div class="settings-section">
        <div class="settings-label">Mémoire RAM allouée</div>
        <div class="ram-row">
          <input type="range" id="ram-slider" min="2" max="16" step="1" value="4">
          <div class="ram-value"><span id="ram-display">4</span> Go</div>
        </div>
      </div>

      <div class="settings-section">
        <div class="settings-label">Dossiers du jeu</div>
        <button class="folder-btn" id="btn-open-mods">
          <span class="folder-icon">📦</span> Ouvrir le dossier mods
        </button>
        <button class="folder-btn" id="btn-open-datapacks">
          <span class="folder-icon">🗂️</span> Ouvrir le dossier datapacks
        </button>
        <button class="folder-btn" id="btn-open-shaderpacks">
          <span class="folder-icon">✨</span> Ouvrir le dossier shaderpacks
        </button>
        <button class="folder-btn" id="btn-open-resourcepacks">
          <span class="folder-icon">🎨</span> Ouvrir le dossier resource packs
        </button>
        <button class="folder-btn" id="btn-open-screenshots">
          <span class="folder-icon">📷</span> Ouvrir les screenshots
        </button>
        <button class="folder-btn" id="btn-open-game">
          <span class="folder-icon">📁</span> Ouvrir le dossier du jeu
        </button>
      </div>

      <div class="settings-section">
        <div class="settings-label">Configurations</div>
        <button class="folder-btn reset-defaults" id="btn-reset-defaults">
          <span class="folder-icon">🎯</span> Réinitialiser keybinds & minimap
        </button>
      </div>

      <div class="settings-section">
        <div class="settings-label">Launcher</div>
        <button class="folder-btn update-check" id="btn-check-update">
          <span class="folder-icon">🔄</span> Vérifier les mises à jour
        </button>
        <div id="update-status"></div>
      </div>
    </div>
  </div>

  <div id="app">
    <div id="header">
      <div class="logo-block">
        <div class="logo-icon">⚡</div>
        <div>
          <div class="logo-text">PokéLauncher</div>
          <div class="logo-sub">Cobblemon Edition</div>
        </div>
      </div>
      <div id="auth-block">
        <button id="login-btn">Vérification...</button>
        <div id="user-pill">
          <div class="user-dot"></div>
          <span id="username-label">Joueur</span>
        </div>
      </div>
    </div>

    <div id="section-title">Sélectionner un modpack</div>
    <div id="catalog-status">Chargement des modpacks...</div>
    <div id="packs-grid"></div>

    <div id="bottom">
      <div id="selected-info">
        <div id="sel-icon">🎮</div>
        <div>
          <div id="sel-name">Aucun modpack sélectionné</div>
          <div id="sel-meta">Choisissez un modpack ci-dessus</div>
        </div>
        <div id="launcher-version-tag"></div>
      </div>
      <div id="action-row">
        <button id="play-btn" disabled>SÉLECTIONNER UN MODPACK</button>
        <button id="settings-btn" title="Paramètres">⚙️</button>
      </div>
      <div id="sync-log"></div>
      <progress id="sync-bar" value="0" max="100"></progress>
    </div>
  </div>

<script>
  let selectedPack = null;
  let isLoggedIn = false;
  let ramValue = parseInt(localStorage.getItem('ram') || '4');

  document.getElementById('ram-slider').value = ramValue;
  document.getElementById('ram-display').textContent = ramValue;
  document.getElementById('ram-slider').addEventListener('input', (e) => {
    ramValue = parseInt(e.target.value);
    document.getElementById('ram-display').textContent = ramValue;
    localStorage.setItem('ram', ramValue);
  });

  document.getElementById('settings-btn').addEventListener('click', () => {
    document.getElementById('settings-panel').classList.add('open');
  });
  document.getElementById('settings-close').addEventListener('click', () => {
    document.getElementById('settings-panel').classList.remove('open');
  });
  document.getElementById('settings-panel').addEventListener('click', (e) => {
    if (e.target === document.getElementById('settings-panel'))
      document.getElementById('settings-panel').classList.remove('open');
  });

  document.getElementById('btn-open-mods').addEventListener('click', () => window.api.openFolder('mods'));
  document.getElementById('btn-open-datapacks').addEventListener('click', () => window.api.openFolder('datapacks'));
  document.getElementById('btn-open-shaderpacks').addEventListener('click', () => window.api.openFolder('shaderpacks'));
  document.getElementById('btn-open-resourcepacks').addEventListener('click', () => window.api.openFolder('resourcepacks'));
  document.getElementById('btn-open-screenshots').addEventListener('click', () => window.api.openFolder('screenshots'));
  document.getElementById('btn-open-game').addEventListener('click', () => window.api.openFolder('game'));

  // Réinitialiser keybinds & configs
  document.getElementById('btn-reset-defaults').addEventListener('click', () => {
    if (confirm('Réinitialiser les keybinds, options et minimap aux valeurs par défaut ?\n\nCela écrasera tes paramètres actuels au prochain lancement.')) {
      window.api.resetDefaults();
    }
  });

  window.api.onDefaultsReset(() => {
    document.getElementById('update-status').textContent = 'Configs réinstallées au prochain lancement ✓';
    document.getElementById('update-status').style.color = '#4ade80';
  });

  // Version du launcher
  window.api.getLauncherVersion().then(v => {
    document.getElementById('launcher-version-tag').textContent = 'v' + v;
  });

  // Update check manuel
  document.getElementById('btn-check-update').addEventListener('click', () => {
    document.getElementById('update-status').textContent = 'Vérification en cours...';
    document.getElementById('update-status').style.color = '#9ca3af';
    window.api.checkUpdate();
  });

  document.getElementById('update-close').addEventListener('click', () => {
    document.getElementById('update-banner').classList.remove('show');
  });

  window.api.onUpdateAvailable((data) => {
    const banner = document.getElementById('update-banner');
    banner.classList.add('show');
    document.getElementById('update-text').textContent = `Mise à jour disponible : v${data.version}`;
    const btn = document.getElementById('update-action');
    btn.disabled = false;
    btn.textContent = 'Télécharger';
    btn.onclick = () => {
      btn.disabled = true;
      btn.textContent = 'Téléchargement...';
      window.api.downloadUpdate();
    };
    document.getElementById('update-status').textContent = `Nouvelle version v${data.version} disponible !`;
    document.getElementById('update-status').style.color = '#a78bfa';
  });

  window.api.onUpdateNotAvailable(() => {
    document.getElementById('update-status').textContent = 'Vous êtes à jour ✓';
    document.getElementById('update-status').style.color = '#4ade80';
  });

  window.api.onUpdateProgress((data) => {
    document.getElementById('update-text').textContent = `Téléchargement : ${data.pct}%`;
  });

  window.api.onUpdateDownloaded(() => {
    const btn = document.getElementById('update-action');
    btn.disabled = false;
    btn.textContent = 'Installer & redémarrer';
    btn.onclick = () => window.api.installUpdate();
    document.getElementById('update-text').textContent = 'Mise à jour prête !';
  });

  window.api.onUpdateError((msg) => {
    document.getElementById('update-status').textContent = 'Erreur : ' + msg;
    document.getElementById('update-status').style.color = '#ef4444';
  });

  async function loadCatalog() {
    const result = await window.api.getCatalog();
    const grid = document.getElementById('packs-grid');
    const status = document.getElementById('catalog-status');
    if (!result.success) { status.textContent = "Erreur : " + result.error; return; }
    status.style.display = 'none';
    result.catalog.modpacks.forEach(pack => {
      const card = document.createElement('div');
      card.className = 'pack-card';
      card.innerHTML = `
        <div class="selected-badge">✓</div>
        <div class="pack-img-wrap">
          <img src="${pack.icon_url}" onerror="this.style.display='none';this.nextElementSibling.style.display='block'" alt="">
          <span class="pack-emoji" style="display:none">🎮</span>
        </div>
        <div class="pack-name">${pack.name}</div>
        <div class="pack-desc">${pack.description}</div>
        <div class="pack-meta">
          <span class="pack-tag mc">MC ${pack.minecraft}</span>
          <span class="pack-tag">${pack.loader}</span>
          <span class="pack-tag">v${pack.version}</span>
        </div>`;
      card.addEventListener('click', () => selectPack(pack, card));
      grid.appendChild(card);
    });
  }

  function selectPack(pack, card) {
    document.querySelectorAll('.pack-card').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');
    selectedPack = pack;
    document.getElementById('sel-icon').textContent = '⚡';
    document.getElementById('sel-name').textContent = pack.name;
    document.getElementById('sel-meta').textContent = 'Minecraft ' + pack.minecraft + ' · ' + pack.loader + ' · v' + pack.version;
    updatePlayBtn();
  }

  function updatePlayBtn() {
    const btn = document.getElementById('play-btn');
    if (selectedPack && isLoggedIn) {
      btn.disabled = false;
      btn.textContent = 'JOUER — ' + selectedPack.name.toUpperCase();
    } else if (!isLoggedIn) {
      btn.disabled = true;
      btn.textContent = 'CONNECTEZ-VOUS POUR JOUER';
    } else {
      btn.disabled = true;
      btn.textContent = 'SÉLECTIONNER UN MODPACK';
    }
  }

  document.getElementById('login-btn').addEventListener('click', () => {
    document.getElementById('login-btn').innerHTML = 'Connexion...';
    document.getElementById('login-btn').disabled = true;
    window.api.loginMicrosoft();
  });

  document.getElementById('play-btn').addEventListener('click', () => {
    if (!selectedPack) return;
    const btn = document.getElementById('play-btn');
    btn.disabled = true;
    btn.classList.add('syncing');
    btn.textContent = 'SYNCHRONISATION...';
    document.getElementById('sync-log').style.color = "#6b7280";
    document.getElementById('sync-log').textContent = 'Vérification des mods...';
    window.api.launchGame({ ...selectedPack, ram: ramValue });
  });

  window.api.onAuthSuccess((data) => {
    document.getElementById('login-btn').style.display = 'none';
    document.getElementById('user-pill').style.display = 'flex';
    document.getElementById('username-label').textContent = data.name;
    isLoggedIn = true;
    updatePlayBtn();
  });

  window.api.onAuthError(() => {
    const btn = document.getElementById('login-btn');
    btn.disabled = false;
    btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 21 21" fill="none"><rect x="1" y="1" width="9" height="9" fill="#F25022"/><rect x="11" y="1" width="9" height="9" fill="#7FBA00"/><rect x="1" y="11" width="9" height="9" fill="#00A4EF"/><rect x="11" y="11" width="9" height="9" fill="#FFB900"/></svg> Réessayer`;
  });

  window.api.onAuthMissing(() => {
    const btn = document.getElementById('login-btn');
    btn.disabled = false;
    btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 21 21" fill="none"><rect x="1" y="1" width="9" height="9" fill="#F25022"/><rect x="11" y="1" width="9" height="9" fill="#7FBA00"/><rect x="1" y="11" width="9" height="9" fill="#00A4EF"/><rect x="11" y="11" width="9" height="9" fill="#FFB900"/></svg> Connexion Microsoft`;
  });

  window.api.onSyncStatus((data) => {
    document.getElementById('sync-log').style.color = "#6b7280";
    document.getElementById('sync-log').textContent = data.message;
  });

  window.api.onSyncProgress((data) => {
    const bar = document.getElementById('sync-bar');
    bar.style.display = 'block';
    bar.value = data.pct;
    document.getElementById('sync-log').textContent = data.fileName + ' — ' + data.pct + '%';
    if (data.pct >= 100) setTimeout(() => { bar.style.display = 'none'; }, 1000);
  });

  window.api.onLaunchError((errorMsg) => {
    const btn = document.getElementById('play-btn');
    btn.disabled = false;
    btn.classList.remove('syncing');
    btn.textContent = 'JOUER — ' + (selectedPack ? selectedPack.name.toUpperCase() : '');
    const log = document.getElementById('sync-log');
    log.textContent = "Erreur : " + errorMsg;
    log.style.color = "#ef4444";
  });

  window.api.autoLogin();
  loadCatalog();
</script>
</body>
</html>
